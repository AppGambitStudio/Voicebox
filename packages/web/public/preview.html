<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Voicebox preview · APPGAMBiT</title>
    <style>
      :root { color-scheme: light; }
      html, body { margin: 0; padding: 0; min-height: 100%; background: #f7f4ee; font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; color: #17201b; }
      .preview-stage { min-height: 100vh; display: grid; place-items: center; padding: 24px; box-sizing: border-box; text-align: center; }
      .preview-card { max-width: 420px; padding: 28px; background: #fffefa; border: 1px solid #e0d8cc; border-radius: 12px; box-shadow: 0 18px 60px rgba(22, 37, 31, 0.12); }
      .preview-eyebrow { margin: 0 0 8px; font-size: 12px; font-weight: 800; letter-spacing: 0.08em; text-transform: uppercase; color: #0d6b57; }
      .preview-title { margin: 0 0 12px; font-size: 22px; font-weight: 900; line-height: 1.2; }
      .preview-body { margin: 0; font-size: 14px; line-height: 1.55; color: #4d5a53; }
      .preview-error { margin: 24px auto 0; max-width: 420px; padding: 16px 20px; border-radius: 10px; background: #fff0ee; border: 1px solid #f4cac0; color: #8c2a18; font-size: 14px; line-height: 1.45; text-align: left; }
    </style>
  </head>
  <body>
    <div class="preview-stage">
      <div class="preview-card">
        <p class="preview-eyebrow">Test mode</p>
        <h1 class="preview-title">Try your Voicebox widget</h1>
        <p class="preview-body">Tap the floating button to start a real conversation. Test calls don't count toward your monthly limit and no bookings are saved.</p>
      </div>
      <p class="preview-error" id="preview-error" hidden></p>
    </div>
    <script>
      (() => {
        const params = new URLSearchParams(window.location.search);
        const widgetId = params.get("widgetId");
        const apiUrl = params.get("apiUrl");
        const errorEl = document.getElementById("preview-error");

        if (!widgetId || !apiUrl) {
          errorEl.hidden = false;
          errorEl.textContent = "Missing widgetId or apiUrl in the preview URL.";
          return;
        }

        const script = document.createElement("script");
        script.src = "/embed/voice-booking-widget.js";
        script.dataset.widgetId = widgetId;
        script.dataset.apiUrl = apiUrl;
        script.dataset.preview = "1";
        script.defer = true;
        document.body.appendChild(script);
      })();
    </script>
  </body>
</html>
